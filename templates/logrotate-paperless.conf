# logrotate configuration for Paperless Overconfigured
# Generated by install.sh / setup-logrotate.sh — do not edit manually.
#
# Rotates backup.log, docker-update.log and neo4j-sync.log monthly.
# Rotated files older than 2 months are deleted (rotate 2).

__INSTALL_DIR__/backup.log
__INSTALL_DIR__/docker-update.log
__INSTALL_DIR__/neo4j-sync.log
{
    monthly
    rotate 2
    compress
    delaycompress
    missingok
    notifempty
    create 0640 root root
    olddir __INSTALL_DIR__/logs
    createolddir 0750 root root
}
